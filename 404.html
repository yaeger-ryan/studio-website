<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 // ETERNAL CANVAS</title>
    
    <!-- Premium Google Fonts: Inter (Editorial Body), Space Mono (Technical UI) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS (No Preflight) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { corePlugins: { preflight: false } }
    </script>

    <style>
        :root {
            --bg-deep: #050505;
            --bg-light: #161616;
            --accent: #b026ff;
            --font-body: 'Inter', sans-serif;
            --font-mono: 'Space Mono', monospace;
        }

        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            margin: 0; padding: 0; background: var(--bg-deep); 
            height: 100vh; width: 100vw; overflow: hidden; 
            font-family: var(--font-body); background-color: var(--bg-deep);
            /* Prevent pull-to-refresh and scrolling on mobile to allow tactile wiping */
            touch-action: none; overscroll-behavior: none;
        }

        /* The Cinematic Transition Wrapper */
        #transition-wrap {
            position: absolute; inset: 0; width: 100%; height: 100%;
            transition: transform 1.5s cubic-bezier(0.19, 1, 0.22, 1), opacity 1s ease;
        }

        /* --- THE SHARP REALITY (BOTTOM LAYER) --- */
        #base-layer {
            position: absolute; inset: 0; z-index: 1;
            background: radial-gradient(circle at center, var(--bg-light) 0%, var(--bg-deep) 80%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        #exit-link {
            text-decoration: none; text-align: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; z-index: 10; padding: 40px;
        }

        .quote {
            font-weight: 300;
            font-size: clamp(24px, 3.5vw, 42px);
            color: #666; /* Muted gray */
            letter-spacing: -0.02em;
            line-height: 1.2;
            margin: 0 0 20px 0;
            transition: color 0.6s ease, text-shadow 0.6s ease;
        }

        .meta-tag {
            font-family: var(--font-mono);
            font-size: 10px; font-weight: 700;
            letter-spacing: 0.2em; text-transform: uppercase;
            color: rgba(255, 255, 255, 0.2);
            transition: color 0.6s ease, transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* Hovering the sharp text illuminates the way home */
        #exit-link:hover .quote {
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }
        #exit-link:hover .meta-tag {
            color: var(--accent);
            transform: translateY(4px);
        }

        /* --- THE FOG (TOP LAYER) --- */
        #fog-canvas {
            position: absolute; inset: 0; z-index: 5;
            width: 100%; height: 100%;
            /* Let pointer events pass through so the user can click the anchor link beneath the fog */
            pointer-events: none; 
        }

        /* --- THE EXIT SEQUENCE --- */
        body.exiting #transition-wrap {
            transform: scale(1.03);
            opacity: 0;
        }
        body.exiting #fog-canvas {
            opacity: 0; transition: opacity 0.8s ease;
        }
    </style>
</head>
<body>

    <div id="transition-wrap">
        
        <!-- BASE LAYER: The Sharp Reality -->
        <div id="base-layer">
            <a href="/" id="exit-link" title="Return to Reality">
                <h1 class="quote" id="sharp-quote">A temporary mark on an eternal canvas.</h1>
                <div class="meta-tag" id="sharp-meta">[ 404 // CLICK TO RETURN ]</div>
            </a>
        </div>

        <!-- TOP LAYER: The Condensation -->
        <canvas id="fog-canvas"></canvas>

    </div>

    <script>
        const canvas = document.getElementById('fog-canvas');
        const ctx = canvas.getContext('2d', { alpha: true });
        
        // Offscreen buffer to hold the pure "Foggy State"
        // We draw this back over the main canvas at a very low opacity every frame to simulate refogging.
        const fogBuffer = document.createElement('canvas');
        const fogCtx = fogBuffer.getContext('2d', { alpha: false });

        // DOM Elements to match alignment
        const quoteEl = document.getElementById('sharp-quote');
        const metaEl = document.getElementById('sharp-meta');

        let w, h;
        let lastX = -1000, lastY = -1000;
        let isTouching = false;

        // Ensure custom fonts are loaded before painting the fog text
        document.fonts.ready.then(() => {
            initEngine();
            requestAnimationFrame(renderLoop);
        });

        function initEngine() {
            resize();
            window.addEventListener('resize', resize);
            
            // Desktop Wipe
            window.addEventListener('mousemove', (e) => {
                const currentX = e.clientX;
                const currentY = e.clientY;
                wipe(lastX, lastY, currentX, currentY);
                lastX = currentX; lastY = currentY;
            });

            // Mobile/Tactile Wipe
            window.addEventListener('touchstart', (e) => {
                isTouching = true;
                lastX = e.touches[0].clientX;
                lastY = e.touches[0].clientY;
            }, { passive: false });

            window.addEventListener('touchmove', (e) => {
                if (!isTouching) return;
                e.preventDefault(); // Stop scrolling
                const currentX = e.touches[0].clientX;
                const currentY = e.touches[0].clientY;
                wipe(lastX, lastY, currentX, currentY);
                lastX = currentX; lastY = currentY;
            }, { passive: false });

            window.addEventListener('touchend', () => isTouching = false);
        }

        function resize() {
            w = window.innerWidth;
            h = window.innerHeight;
            
            // Retina display scaling for pristine graphics
            const dpr = window.devicePixelRatio || 1;
            
            canvas.width = w * dpr;
            canvas.height = h * dpr;
            canvas.style.width = w + 'px';
            canvas.style.height = h + 'px';
            ctx.scale(dpr, dpr);
            
            fogBuffer.width = w * dpr;
            fogBuffer.height = h * dpr;
            fogCtx.scale(dpr, dpr);

            drawFogState(fogCtx, w, h);
            
            // Instantly fill the main screen with solid fog on load/resize
            ctx.globalCompositeOperation = 'source-over';
            ctx.globalAlpha = 1.0;
            ctx.drawImage(fogBuffer, 0, 0, w, h);
        }

        function drawFogState(context, width, height) {
            // 1. The cold, dark background
            let grad = context.createRadialGradient(width/2, height/2, 0, width/2, height/2, Math.max(width, height));
            grad.addColorStop(0, '#161616');
            grad.addColorStop(1, '#050505');
            context.fillStyle = grad;
            context.fillRect(0, 0, width, height);

            // Add microscopic noise/frost texture overlay
            context.fillStyle = 'rgba(255, 255, 255, 0.015)';
            context.fillRect(0, 0, width, height);

            // 2. The Blurred Quote
            const quoteStyle = window.getComputedStyle(quoteEl);
            context.textAlign = 'center';
            context.textBaseline = 'middle';
            context.font = `300 ${quoteStyle.fontSize} 'Inter', sans-serif`;
            context.fillStyle = '#444444'; // Slightly darker in the fog
            context.filter = 'blur(12px)';   // Heavy frosted blur
            
            // Calculate exact position based on HTML layout
            const quoteRect = quoteEl.getBoundingClientRect();
            const quoteY = quoteRect.top + (quoteRect.height / 2);
            context.fillText("A temporary mark on an eternal canvas.", width/2, quoteY);
            
            // 3. The Blurred Meta Tag
            const metaStyle = window.getComputedStyle(metaEl);
            context.font = `700 ${metaStyle.fontSize} 'Space Mono', monospace`;
            context.fillStyle = 'rgba(255,255,255,0.15)';
            context.filter = 'blur(8px)';
            
            const metaRect = metaEl.getBoundingClientRect();
            const metaY = metaRect.top + (metaRect.height / 2);
            // Apply letter spacing hack for canvas if supported
            if(context.letterSpacing !== undefined) context.letterSpacing = "0.2em";
            context.fillText("[ 404 // CLICK TO RETURN ]", width/2, metaY);
            
            context.filter = 'none'; // Reset
        }

        function wipe(x1, y1, x2, y2) {
            // Ignore giant jumps (like cursor entering screen)
            if (x1 === -1000 || Math.hypot(x2 - x1, y2 - y1) > 150) { 
                return; 
            }
            
            // Destination-out punches a transparent hole into the canvas
            ctx.globalCompositeOperation = 'destination-out';
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            // Multi-pass stroking to create a soft, feathered organic brush edge
            for (let i = 0; i < 6; i++) {
                ctx.lineWidth = 100 - (i * 14); // Radiates outward
                ctx.strokeStyle = `rgba(0, 0, 0, ${0.1 + (i * 0.15)})`; // Center is solid, edges are faint
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            }
        }

        function renderLoop() {
            // Draw the offscreen fog buffer back over the main canvas constantly.
            // A very low global alpha makes the transparent "wiped" areas slowly 
            // accumulate fog until they are completely opaque again.
            ctx.globalCompositeOperation = 'source-over';
            ctx.globalAlpha = 0.008; // Slower fade = colder, longer lasting marks
            ctx.drawImage(fogBuffer, 0, 0, w, h);
            
            requestAnimationFrame(renderLoop);
        }

        const link = document.getElementById('exit-link');
        
        link.addEventListener('click', (e) => {
            e.preventDefault();
            // Trigger the CSS animations
            document.body.classList.add('exiting');
            
            // Allow animations to finish before firing the redirect
            setTimeout(() => {
                window.location.href = '/';
            }, 1200);
        });

    </script>
</body>
</html>
