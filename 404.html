<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 // DIGITAL IRIDESCENCE</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (No Preflight) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { corePlugins: { preflight: false } }
    </script>

    <!-- Three.js CDN for WebGL Rendering -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        :root {
            --font-disp: 'Syne', sans-serif;
            --font-mono: 'Space Mono', monospace;
            --font-body: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; outline: none; user-select: none; }
        
        html, body { 
            margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; 
            font-family: var(--font-body);
            background: radial-gradient(circle at 50% 50%, #0a0a0a 0%, #000000 100%);
            cursor: crosshair;
        }

        #webgl-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }

        .ui-layer {
            position: absolute; inset: 0; z-index: 10; pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: clamp(20px, 4vw, 50px);
        }

        .meta-text { 
            font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; 
            letter-spacing: 0.25em; color: rgba(255, 255, 255, 0.4); 
        }

        .instruction {
            position: absolute; bottom: 15%; left: 50%; transform: translateX(-50%);
            font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.3em;
            color: rgba(255,255,255,0.7); text-transform: uppercase;
            background: rgba(0,0,0,0.5); padding: 10px 20px; border: 1px dashed rgba(255,255,255,0.2);
            backdrop-filter: blur(4px); transition: opacity 0.5s ease;
        }
        
        .is-interacting .instruction { opacity: 0; }

        /* The Collapse Flash Overlay */
        #flash-overlay {
            position: absolute; inset: 0; background: white; z-index: 9999;
            opacity: 0; pointer-events: none; transition: opacity 0.15s ease-in;
        }

        /* Progress Ring for Click-and-Hold */
        #hold-progress {
            position: fixed; border: 1px solid rgba(255,255,255,0.5); border-radius: 50%;
            pointer-events: none; z-index: 50; transform: translate(-50%, -50%) scale(0);
            transition: transform 0.1s linear, opacity 0.2s; opacity: 0;
        }
    </style>
</head>
<body>

    <div class="ui-layer">
        <div class="flex justify-between w-full">
            <div class="meta-text">404 // SIGNAL ABSENT</div>
            <div class="meta-text hidden md:block">MATERIAL: LENTICULAR MEMORY FOAM</div>
        </div>
        <div class="flex justify-between w-full items-end">
            <div class="meta-text">YAEGER STUDIO<br>EST. 2019</div>
            <div class="meta-text text-right">VOLUMETRIC DISPLACEMENT ACTIVE<br>AWAITING INPUT</div>
        </div>
    </div>

    <div class="instruction">[ DRAG TO DEFORM // HOLD TO INITIATE RETURN ]</div>
    
    <div id="hold-progress"></div>
    <div id="flash-overlay"></div>

    <canvas id="webgl-canvas"></canvas>

    <script>
        const canvas = document.getElementById('webgl-canvas');
        const flashOverlay = document.getElementById('flash-overlay');
        const holdProgressEl = document.getElementById('hold-progress');
        
        let scene, camera, renderer, mesh;
        let geometry, posAttribute, originalPos, velocities, displacements;
        
        // Interaction variables
        const mouse = new THREE.Vector2();
        const raycaster = new THREE.Raycaster();
        let targetIntersection = null;
        let isHolding = false;
        let holdTime = 0;
        const maxHoldTime = 45; // ~0.75 seconds at 60fps for a responsive feel
        
        // Smoothing variables for the shader
        let smoothedMouseX = 0;
        let smoothedMouseY = 0;

        init();
        animate();

        function init() {
            // 1. Scene Setup
            scene = new THREE.Scene();

            // 2. Camera Setup
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.z = 8;

            // 3. Renderer Setup
            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            // High-density sphere (64x64 = 4096 vertices). High enough for smooth deformation, low enough for CPU physics calculation.
            geometry = new THREE.SphereGeometry(2.5, 64, 64);
            
            posAttribute = geometry.attributes.position;
            const count = posAttribute.count;
            
            // Store original coordinates and create physics arrays
            originalPos = new Float32Array(count * 3);
            for(let i=0; i<count * 3; i++) originalPos[i] = posAttribute.array[i];
            
            velocities = new Float32Array(count);
            displacements = new Float32Array(count);

            const shaderMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    u_time: { value: 0.0 },
                    u_mouse: { value: new THREE.Vector2(0, 0) },
                    u_collapse: { value: 0.0 }
                },
                vertexShader: `
                    varying vec3 vNormal;
                    varying vec3 vViewPosition;
                    varying vec2 vUv;
                    uniform float u_time;
                    uniform float u_collapse;

                    void main() {
                        vUv = uv;
                        // Retrieve the normal dynamically updated by CPU physics
                        vNormal = normalize(normalMatrix * normal);
                        
                        // Gentle procedural undulation (breathing effect) when idle
                        vec3 pos = position;
                        float noise = sin(pos.x * 2.0 + u_time) * cos(pos.y * 2.0 + u_time) * 0.05;
                        pos += normal * noise;

                        // Collapse logic (sucks the shape into a single point)
                        pos = mix(pos, vec3(0.0), u_collapse);

                        vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                        vViewPosition = -mvPosition.xyz;
                        gl_Position = projectionMatrix * mvPosition;
                    }
                `,
                fragmentShader: `
                    varying vec3 vNormal;
                    varying vec3 vViewPosition;
                    varying vec2 vUv;
                    uniform vec2 u_mouse;

                    void main() {
                        vec3 N = normalize(vNormal);
                        vec3 V = normalize(vViewPosition);
                        
                        // 1. The Micro-Ridges (Lenticular Texture)
                        // High frequency sine wave across the UV x-axis
                        float ridge = sin(vUv.x * 1200.0) * 0.5 + 0.5;
                        
                        // 2. Lenticular View Calculation
                        // Modulate the dot product by the mouse position to shift colors
                        float viewDot = max(dot(N, V), 0.0);
                        float shift = viewDot + (u_mouse.x * 0.3) + (u_mouse.y * 0.3) + (ridge * 0.08);
                        
                        // Ensure shift loops smoothly between 0.0 and 1.0
                        float t = fract(shift);

                        // 3. The Custom Color Ramp (Champagne -> Copper -> Pink -> Cyan -> Violet)
                        vec3 color;
                        if (t < 0.2) {
                            color = mix(vec3(0.9, 0.85, 0.7), vec3(0.8, 0.4, 0.2), t / 0.2);
                        } else if (t < 0.4) {
                            color = mix(vec3(0.8, 0.4, 0.2), vec3(1.0, 0.1, 0.5), (t - 0.2) / 0.2);
                        } else if (t < 0.6) {
                            color = mix(vec3(1.0, 0.1, 0.5), vec3(0.0, 0.8, 1.0), (t - 0.4) / 0.2);
                        } else if (t < 0.8) {
                            color = mix(vec3(0.0, 0.8, 1.0), vec3(0.4, 0.0, 0.8), (t - 0.6) / 0.2);
                        } else {
                            color = mix(vec3(0.4, 0.0, 0.8), vec3(0.9, 0.85, 0.7), (t - 0.8) / 0.2);
                        }

                        // 4. Lighting & Specular Punch
                        // Deepen the colors for a more premium metallic look
                        color = pow(color, vec3(1.3)); 
                        
                        // Soft diffuse shading
                        color *= (viewDot * 0.8 + 0.2); 
                        
                        // Fake rim light / specular highlight hitting the ridges
                        vec3 H = normalize(V + vec3(1.0, 1.0, 1.0));
                        float spec = pow(max(dot(N, H), 0.0), 32.0);
                        color += spec * 0.6 * ridge;

                        gl_FragColor = vec4(color, 1.0);
                    }
                `
            });

            mesh = new THREE.Mesh(geometry, shaderMaterial);
            scene.add(mesh);

            window.addEventListener('resize', onWindowResize);
            
            // Mouse/Touch Move for Raycasting
            window.addEventListener('pointermove', onPointerMove);
            
            // Hold Mechanics
            window.addEventListener('pointerdown', (e) => {
                isHolding = true;
                updatePointerProgressUI(e.clientX, e.clientY);
                holdProgressEl.style.opacity = '1';
                onPointerMove(e); // Ensure instant contact
            });
            
            window.addEventListener('pointerup', () => {
                isHolding = false;
                holdProgressEl.style.opacity = '0';
            });
            window.addEventListener('pointerleave', () => {
                isHolding = false;
                holdProgressEl.style.opacity = '0';
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onPointerMove(event) {
            document.body.classList.add('is-interacting');
            
            // Normalized Device Coordinates (-1 to +1)
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            if(isHolding) {
                updatePointerProgressUI(event.clientX, event.clientY);
            }

            // Raycast to find intersection point on the mesh
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(mesh);

            if (intersects.length > 0) {
                // Store the local point of impact
                targetIntersection = intersects[0].point; 
            } else {
                targetIntersection = null;
            }
        }

        function updatePointerProgressUI(x, y) {
            holdProgressEl.style.left = `${x}px`;
            holdProgressEl.style.top = `${y}px`;
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now() * 0.001;

            // 1. Update Shader Uniforms
            mesh.material.uniforms.u_time.value = time;
            
            // Smooth the mouse values for the iridescent shift so it doesn't jitter
            smoothedMouseX += (mouse.x - smoothedMouseX) * 0.05;
            smoothedMouseY += (mouse.y - smoothedMouseY) * 0.05;
            mesh.material.uniforms.u_mouse.value.set(smoothedMouseX, smoothedMouseY);

            // 2. Handle Click-and-Hold Collapse Logic
            if (isHolding && targetIntersection) {
                holdTime++;
                // Update UI Ring
                const scale = (holdTime / maxHoldTime) * 1.5;
                holdProgressEl.style.transform = `translate(-50%, -50%) scale(${scale})`;
                holdProgressEl.style.borderWidth = `${3 * (holdTime / maxHoldTime)}px`;
            } else {
                // Rapid decay if let go early
                holdTime = Math.max(0, holdTime - 2);
            }

            // Calculate exponential collapse curve
            const collapseEased = Math.pow(holdTime / maxHoldTime, 3.0);
            mesh.material.uniforms.u_collapse.value = collapseEased;

            // Trigger Exit
            if (holdTime >= maxHoldTime) {
                isHolding = false;
                flashOverlay.style.opacity = '1';
                setTimeout(() => {
                    window.location.href = '/'; // Return to index
                }, 200);
            }

            // 3. CPU Soft-Body Physics (Viscous Spring Engine)
            const count = posAttribute.count;
            const normals = geometry.attributes.normal.array;
            
            // Physics Tuning Constants
            const deformationRadius = 1.2; 
            const maxPush = -0.4;  // How deep the finger pushes
            const stiffness = 0.08; // Spring strength
            const damping = 0.88;   // Viscosity (closer to 1.0 = slower, heavier memory foam ease)

            let needsVertexUpdate = false;

            for (let i = 0; i < count; i++) {
                let targetDisplacement = 0;

                // If hovering over shape, calculate pushing force based on radius
                if (targetIntersection && holdTime < maxHoldTime) {
                    const ox = originalPos[i * 3];
                    const oy = originalPos[i * 3 + 1];
                    const oz = originalPos[i * 3 + 2];
                    
                    // Distance from vertex to raycast impact point
                    const dx = ox - targetIntersection.x;
                    const dy = oy - targetIntersection.y;
                    const dz = oz - targetIntersection.z;
                    const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);

                    if (dist < deformationRadius) {
                        // Soft falloff curve for smooth indentations
                        const influence = Math.pow(1.0 - (dist / deformationRadius), 2.0);
                        targetDisplacement = maxPush * influence;
                    }
                }

                // Spring Physics Math (Hooke's Law + Damping)
                const force = (targetDisplacement - displacements[i]) * stiffness;
                velocities[i] = (velocities[i] + force) * damping;
                displacements[i] += velocities[i];

                // Optimization: Only update positions if currently moving significantly
                if (Math.abs(velocities[i]) > 0.0001 || Math.abs(displacements[i]) > 0.0001) {
                    posAttribute.setXYZ(i,
                        originalPos[i * 3]     + normals[i * 3]     * displacements[i],
                        originalPos[i * 3 + 1] + normals[i * 3 + 1] * displacements[i],
                        originalPos[i * 3 + 2] + normals[i * 3 + 2] * displacements[i]
                    );
                    needsVertexUpdate = true;
                }
            }

            // 4. Apply Updates to Mesh
            if (needsVertexUpdate) {
                posAttribute.needsUpdate = true;
                // CRITICAL: Recomputing normals ensures the fragment shader calculates the 
                // lighting and iridescence correctly inside the indented "squished" areas.
                geometry.computeVertexNormals(); 
            }

            // Slowly rotate the entire mesh for ambient presentation
            mesh.rotation.y += 0.001;
            mesh.rotation.x += 0.0005;

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
